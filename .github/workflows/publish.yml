name: Publish pyTRACK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.9"
            cibw-build: "cp39-manylinux_x86_64"
          - python-version: "3.10"
            cibw-build: "cp310-manylinux_x86_64"
          - python-version: "3.11"
            cibw-build: "cp311-manylinux_x86_64"
          - python-version: "3.12"
            cibw-build: "cp312-manylinux_x86_64"
          - python-version: "3.13"
            cibw-build: "cp313-manylinux_x86_64"

    env:
      CIBW_TEST_REQUIRES: "pytest"
      CIBW_TEST_COMMAND: "pytest {project}/tests"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build and test manylinux wheels
        run: python -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: ${{ matrix.cibw-build }}
          CIBW_SKIP: "*-musllinux_i686"
          CIBW_BEFORE_BUILD_LINUX: |
            yum install -y gcc gcc-gfortran make
            yum install -y netcdf netcdf-devel hdf5 hdf5-devel

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.python-version }}
          path: dist/

  publish:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist/

      - name: List dist files
        run: ls -l dist

      - name: Check if version already exists on PyPI
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PACKAGE_NAME="TRACK-pylib"
          echo "Checking if $PACKAGE_NAME version $VERSION exists on PyPI..."
          if curl --silent https://pypi.org/pypi/$PACKAGE_NAME/json | jq -e ".releases[\"$VERSION\"]" > /dev/null; then
            echo "Error: Version $VERSION already exists on PyPI!"
            exit 1
          else
            echo "Version $VERSION is available."
          fi

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
